services:
  chat-server:
    build:
      context: ../Chat.Server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    networks:
      - chat-network

  chat-client:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - chat-server
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge